<!-- DEMO HTML v2 WITH COMMAND INPUT + PERMISSIONS -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SCIOS Demo</title>
<link rel="stylesheet" href="./demo.css">
</head>
<body>

<h1>SCIOS Command Hub</h1>

<div class="controls">
<button id="runBtn">RUN SYSTEM</button>
<button id="resetBtn">RESET</button>
<button id="downloadBtn">DOWNLOAD LOG</button>
</div>

<!-- NEW COMMAND INPUT -->
<div class="cmdBox">
<input id="cmdInput" placeholder="Enter command (ex: analyze system)">
<button id="cmdSend">EXECUTE</button>
</div>

<!-- NEW PERMISSIONS PANEL -->
<div class="permPanel">
<h3>Permissions</h3>
<label><input type="checkbox" checked> Allow Security Agent</label>
<label><input type="checkbox" checked> Allow Finance Agent</label>
<label><input type="checkbox" checked> Allow Ops Agent</label>
<label><input type="checkbox" checked> Allow R&D Agent</label>
</div>

<pre id="terminal"></pre>

<script src="./demo.js"></script>
</body>
</html>
